<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2D Ball Game with Crossbars</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            background-color: #87CEEB;
            border: 4px solid #ffffff;
            border-bottom: 20px solid #2e8b57;
        }
    </style>
</head>
<body>

    <div>
        <h2 id="scoreBoard" style="text-align: center; margin-bottom: 10px;">Score: 0 - 0</h2>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const gravity = 0.4;
        const groundLevel = 350;

        let player1Score = 0;
        let botScore = 0;

        const player = {
            x: 150, y: groundLevel, width: 40, height: 40,
            speed: 6, velocityY: 0, isJumping: false
        };

        const bot = {
            x: 600, y: groundLevel, width: 40, height: 40,
            speed: 4.5, velocityY: 0, isJumping: false
        };

        const ball = {
            x: 400, y: 150, radius: 15,
            velocityX: 3, velocityY: 0,
            bounce: 0.7
        };

        const netWidth = 30;
        const netHeight = 120;
        const leftNet = { x: 0, y: canvas.height - netHeight - 20, width: netWidth, height: netHeight };
        const rightNet = { x: canvas.width - netWidth, y: canvas.height - netHeight - 20, width: netWidth, height: netHeight };

        const keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false };

        window.addEventListener("keydown", (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener("keyup", (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        function updatePhysics() {
            // --- PLAYER 1 MOVEMENT ---
            if (keys.ArrowLeft) player.x -= player.speed;
            if (keys.ArrowRight) player.x += player.speed;
            if (keys.ArrowUp && !player.isJumping) {
                player.velocityY = -10;
                player.isJumping = true;
            }
            player.velocityY += gravity;
            player.y += player.velocityY;
            if (player.y >= groundLevel) { player.y = groundLevel; player.velocityY = 0; player.isJumping = false; }
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            // --- AI BOT INTELLIGENCE ---
            if (ball.x > 350) {
                if (bot.x + bot.width/2 < ball.x) bot.x += bot.speed;
                else if (bot.x + bot.width/2 > ball.x) bot.x -= bot.speed;

                if (ball.y < bot.y && Math.abs(bot.x - ball.x) < 80 && !bot.isJumping) {
                    bot.velocityY = -10;
                    bot.isJumping = true;
                }
            } else {
                if (bot.x < 600) bot.x += bot.speed;
                if (bot.x > 600) bot.x -= bot.speed;
            }
            bot.velocityY += gravity;
            bot.y += bot.velocityY;
            if (bot.y >= groundLevel) { bot.y = groundLevel; bot.velocityY = 0; bot.isJumping = false; }
            if (bot.x < 0) bot.x = 0;
            if (bot.x + bot.width > canvas.width) bot.x = canvas.width - bot.width;

            // --- BALL PHYSICS ---
            ball.velocityY += gravity * 0.8;
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // Bounce Floor
            if (ball.y + ball.radius >= canvas.height - 20) {
                ball.y = canvas.height - 20 - ball.radius;
                ball.velocityY = -ball.velocityY * ball.bounce;
            }
            // Bounce Top Ceiling
           if (ball.y - ball.radius <= 0) {
           ball.y = ball.radius; // Keep ball inside the screen
           ball.velocityY = -ball.velocityY * ball.bounce; // Reverse speed to bounce down
           }
            // Bounce Side Walls (Fixed: Forces the ball out of the wall so it never freezes)
            if (ball.x - ball.radius <= 0) {
                ball.x = ball.radius; // Force it out of the left wall
                ball.velocityX = -ball.velocityX * ball.bounce; // Bounce!
            }
            if (ball.x + ball.radius >= canvas.width) {
                ball.x = canvas.width - ball.radius; // Force it out of the right wall
                ball.velocityX = -ball.velocityX * ball.bounce; // Bounce!
            }
            

            // --- SOLID CROSSBARS (BOUNCE OFF TOP OF GOALS) ---
            // Left Goal Top
            if (ball.x < leftNet.width && Math.abs((ball.y + ball.radius) - leftNet.y) < 10 && ball.velocityY > 0) {
                ball.y = leftNet.y - ball.radius;
                ball.velocityY = -ball.velocityY * ball.bounce;
            }
            // Right Goal Top
            if (ball.x > rightNet.x && Math.abs((ball.y + ball.radius) - rightNet.y) < 10 && ball.velocityY > 0) {
                ball.y = rightNet.y - ball.radius;
                ball.velocityY = -ball.velocityY * ball.bounce;
            }

            // --- COLLISION: Player 1 hits Ball ---
            if (ball.x + ball.radius > player.x && ball.x - ball.radius < player.x + player.width &&
                ball.y + ball.radius > player.y && ball.y - ball.radius < player.y + player.height) {
                ball.velocityX = (ball.x - (player.x + player.width/2)) * 0.4;
                ball.velocityY = -8;
            }

            // --- COLLISION: Bot hits Ball ---
            if (ball.x + ball.radius > bot.x && ball.x - ball.radius < bot.x + bot.width &&
                ball.y + ball.radius > bot.y && ball.y - ball.radius < bot.y + bot.height) {
                ball.velocityX = (ball.x - (bot.x + bot.width/2)) * 0.4;
                ball.velocityY = -8;
            }

            // --- GOAL DETECTION (Must go UNDER the crossbar line now) ---
            if (ball.x < leftNet.x + leftNet.width && ball.y > leftNet.y + 10) {
                botScore++;
                resetBall();
            }
            if (ball.x > rightNet.x && ball.y > rightNet.y + 10) {
                player1Score++;
                resetBall();
            }
        }

        function resetBall() {
            ball.x = 400;
            ball.y = 150;
            ball.velocityX = (Math.random() > 0.5 ? 3 : -3);
            ball.velocityY = 0;
            document.getElementById("scoreBoard").innerText = `Score: ${player1Score} - ${botScore}`;
        }

        function drawScreen() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Goals
            ctx.fillStyle = "white";
            ctx.fillRect(leftNet.x, leftNet.y, leftNet.width, leftNet.height);
            ctx.fillRect(rightNet.x, rightNet.y, rightNet.width, rightNet.height);

            // Draw Player 1 (Red)
            ctx.fillStyle = "#ff4757";
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Draw Bot (Green)
            ctx.fillStyle = "#2ed573";
            ctx.fillRect(bot.x, bot.y, bot.width, bot.height);

            // Draw Ball (Orange)
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#ffa500";
            ctx.fill();
            ctx.closePath();
        }

        function gameLoop() {
            updatePhysics();
            drawScreen();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
